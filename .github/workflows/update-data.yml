name: Update World Cup Data

on:
  schedule:
    - cron: '*/2 * * * *'   # every 2 minutes
  push:
    branches: [main]
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-data.js

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "No changes — data.json is up to date" \
            || (git commit -m "chore: update WC data [skip ci]" && git push)
